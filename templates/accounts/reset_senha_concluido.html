{% extends 'base.html' %}

{% block title %}Senha Alterada - Cartolândia{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card card-clean p-4 p-md-5 shadow-lg border-0 text-center rounded-4">
            <div class="mb-4">
                <i class="fa-solid fa-circle-check text-success mb-2" style="font-size: 3.5rem;"></i>
                <h3 class="fw-bold" style="color: var(--verde-escuro);">Senha Redefinida!</h3>
                <p class="text-muted">A sua senha foi alterada com sucesso. Já pode aceder à sua conta com as novas credenciais.</p>
            </div>

            <a href="{% url 'login' %}" class="btn btn-principal w-100 btn-lg fw-bold shadow-sm">
                <i class="fa-solid fa-right-to-bracket"></i> Fazer Login Agora
            </a>
        </div>
    </div>
</div>
{% endblock %}
