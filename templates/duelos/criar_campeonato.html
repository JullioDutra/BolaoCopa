{% extends 'base.html' %}
{% block title %}Criar Torneio - Cartolândia{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card card-clean shadow p-4 border-0 border-top border-5 border-warning rounded-4 text-center">
            <i class="fa-solid fa-trophy text-warning mb-3" style="font-size: 3rem;"></i>
            <h3 class="fw-bold text-dark">Organizar Torneio</h3>
            <p class="text-muted">Monte sua própria "Champions" e desafie a galera!</p>

            <form method="POST" class="text-start mt-4">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="fw-bold text-secondary">Nome da Taça</label>
                    <input type="text" name="nome" class="form-control form-control-lg bg-light" placeholder="Ex: Copa Cartolândia 2026" required>
                </div>
                <div class="mb-4">
                    <label class="fw-bold text-secondary">Tempo de Inscrição</label>
                    <select name="dias" class="form-select form-select-lg bg-light">
                        <option value="1">1 Dia (Jogo Rápido)</option>
                        <option value="3">3 Dias (Aquecimento)</option>
                        <option value="7">7 Dias (Grande Evento)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold shadow-sm rounded-pill text-dark">
                    <i class="fa-solid fa-flag-checkered"></i> Fundar Campeonato
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
