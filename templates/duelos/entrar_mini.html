{% extends 'base.html' %}

{% block title %}Escolha sua Dupla - Mini Fanáticos{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 text-center">
        <h2 class="fw-bold text-dark"><i class="fa-solid fa-users text-primary"></i> Mini Fanáticos 2v2</h2>
        <p class="text-muted fs-5">Você foi convidado! Escolha o seu lado do campo.</p>

        <form method="POST" class="mt-4">
            {% csrf_token %}
            <div class="row gap-3 justify-content-center">
                
                <!-- DUPLA A -->
                <div class="col-md-5">
                    <button type="submit" name="dupla" value="A" class="btn btn-outline-success w-100 p-4 rounded-4 shadow-sm" {% if vagas_a == 0 %}disabled{% endif %}>
                        <i class="fa-solid fa-shirt fs-1 mb-2"></i>
                        <h4 class="fw-bold">Dupla A</h4>
                        <span class="badge bg-success">{{ vagas_a }} vaga(s) restante(s)</span>
                    </button>
                </div>

                <!-- DUPLA B -->
                <div class="col-md-5">
                    <button type="submit" name="dupla" value="B" class="btn btn-outline-danger w-100 p-4 rounded-4 shadow-sm" {% if vagas_b == 0 %}disabled{% endif %}>
                        <i class="fa-solid fa-shirt fs-1 mb-2"></i>
                        <h4 class="fw-bold">Dupla B</h4>
                        <span class="badge bg-danger">{{ vagas_b }} vaga(s) restante(s)</span>
                    </button>
                </div>

            </div>
        </form>
    </div>
</div>
{% endblock %}
