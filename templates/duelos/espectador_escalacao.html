<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ao Vivo - Escalação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* VARIÁVEL DE ESCALA: Define o tamanho padrão (1) e encolhe no Mobile (0.7) */
        :root {
            --card-scale: 1;
        }

        body { background-color: transparent; color: white; overflow: hidden; font-family: sans-serif; }
        .arena { padding: 20px; text-align: center; }
        
        .campo-verde { 
            background: linear-gradient(180deg, #1b5e20 0%, #2e7d32 100%); 
            border: 3px solid #fff; 
            border-radius: 15px; 
            min-height: calc(280px * var(--card-scale)); 
            padding: calc(20px * var(--card-scale)); 
            position: relative; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.4); 
        }
        
        .jogador-revelado { 
            background: rgba(0,0,0,0.85); 
            color: white; 
            padding: calc(8px * var(--card-scale)) calc(18px * var(--card-scale)); 
            border-radius: 20px; 
            display: inline-block; 
            margin: calc(8px * var(--card-scale)); 
            font-weight: bold; 
            border: 2px solid #d4af37; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); 
            font-size: calc(1.1rem * var(--card-scale)); 
            transition: all 0.3s ease;
        }
        
        /* Efeito Piscar Ao Vivo */
        .live-badge { animation: pulse 1.5s infinite; background-color: #dc3545; color: white; padding: 3px 10px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; letter-spacing: 1px;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* MAGIA MOBILE DA ARQUIBANCADA */
        @media (max-width: 768px) {
            :root { --card-scale: 0.7; }
            .arena { padding: 10px; }
            .arena h3 { font-size: 1.2rem; margin-top: 15px; }
            .campo-verde h5 { font-size: 1rem; }
            #msg-vencedor { padding: 15px !important; }
            #msg-vencedor .titulo-vencedor { font-size: 1.2rem !important; }
            #msg-vencedor .time-historico { font-size: 1.1rem !important; }
        }
    </style>
</head>
<body>

<!-- Letreiro AO VIVO -->
<div class="position-absolute top-0 start-0 m-3 z-3">
    <span class="live-badge"><i class="fa-solid fa-circle"></i> AO VIVO</span>
    <span class="badge bg-dark ms-2 shadow"><i class="fa-solid fa-eye"></i> <span id="espectadores-count">Carregando...</span></span>
</div>

<div class="container-fluid arena mt-4">
    <h3 class="text-success fw-bold mb-4 text-uppercase" style="letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
        <i class="fa-solid fa-clipboard-list"></i> Prancheta do Professor
    </h3>

    <div class="row justify-content-center">
        <div class="col-10 col-md-8">
            <div class="campo-verde">
                <h5 class="text-white opacity-75 mb-4 fw-bold text-uppercase"><i class="fa-solid fa-futbol"></i> Jogadores Descobertos</h5>
                
                <div id="area-jogadores" class="d-flex flex-wrap justify-content-center align-items-center">
                    
                    <div id="status-informativo" class="d-flex flex-column align-items-center opacity-75 mt-3 w-100">
                        <div id="icone-spinner" class="spinner-border text-light mb-2" role="status"></div>
                        <span id="texto-spinner" class="fw-bold">Conectando ao campo...</span>
                    </div>

                    <!-- O Django pré-carrega todos os nomes escondidos. O JS só revela na hora certa! -->
                    {% for item in partida.categoria.itens.all %}
                        <div class="jogador-revelado d-none" id="jogador-{{ item.id }}">
                            <i class="fa-solid fa-check text-success me-1"></i> {{ item.get_nome }}
                        </div>
                    {% endfor %}

                </div>
            </div>
            
            <!-- A DIV DO VENCEDOR AGORA É UM BLOCO MAIOR E MAIS BONITO -->
            <div id="msg-vencedor" class="mt-4 w-100 bg-dark p-4 rounded-4 shadow-lg border border-warning d-none"></div>

        </div>
    </div>
</div>

<script>
    function atualizarTransmissao() {
        fetch("{% url 'duelos:status_partida_api' partida.id %}")
        .then(res => res.json())
        .then(data => {
            
            // Ibope 100% Real
            if (data.espectadores_reais !== undefined) {
                document.getElementById('espectadores-count').innerText = data.espectadores_reais;
            }

            let statusBox = document.getElementById('status-informativo');
            let spinnerIcon = document.getElementById('icone-spinner');
            let statusText = document.getElementById('texto-spinner');

            if (data.status === 'aguardando') {
                statusBox.classList.remove('d-none');
                spinnerIcon.classList.remove('d-none');
                statusText.innerText = "Aguardando os jogadores conectarem...";
            
            } else if (data.revelados_ids && data.revelados_ids.length > 0) {
                statusBox.classList.add('d-none');
                data.revelados_ids.forEach(id => {
                    let pill = document.getElementById(`jogador-${id}`);
                    if (pill && pill.classList.contains('d-none')) {
                        pill.classList.remove('d-none');
                        pill.animate([{ transform: 'scale(0)' }, { transform: 'scale(1)' }], { duration: 300 });
                    }
                });
            
            } else {
                statusBox.classList.remove('d-none');
                spinnerIcon.classList.add('d-none');
                statusText.innerHTML = "<i class='fa-solid fa-eye fs-3 mb-2 d-block'></i> De olho na prancheta...<br>Nenhum acerto ainda!";
            }

            // ========================================================
            // FIM DE JOGO: ANÚNCIO DE VENCEDOR E TIME HISTÓRICO
            // ========================================================
            if (data.status === 'finalizado') {
                statusBox.classList.add('d-none'); 
                
                let msgDiv = document.getElementById('msg-vencedor');
                msgDiv.classList.remove('d-none');
                
                let nomeVencedor = "Empate Tático!";
                if (data.pontos_j1 > data.pontos_j2) {
                    nomeVencedor = "{{ partida.jogador_criador.first_name|default:partida.jogador_criador.username|escapejs }}";
                } else if (data.pontos_j2 > data.pontos_j1) {
                    nomeVencedor = "{{ partida.jogador_convidado.first_name|default:partida.jogador_convidado.username|escapejs }}";
                }
                
                // Monta o placar com o título da categoria (Time Histórico)
                msgDiv.innerHTML = `
                    <div class="titulo-vencedor text-warning fw-bold fs-3 mb-3">
                        <i class="fa-solid fa-trophy"></i> Venceu: ${nomeVencedor}
                    </div>
                    <div class="pt-3 border-top border-secondary">
                        <span class="fs-6 text-muted d-block mb-1 text-uppercase">O Time da Prancheta era:</span>
                        <div class="time-historico text-white fw-bold fs-4 text-uppercase">
                            {{ partida.categoria.titulo }}
                        </div>
                    </div>
                `;
            }
        }).catch(err => console.error(err));
    }
    
    // Roda a cada 2 segundos
    setInterval(atualizarTransmissao, 2000);
    // Chama a primeira vez imediatamente
    atualizarTransmissao();
</script>
</body>
</html>
