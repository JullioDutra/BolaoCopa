<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ao Vivo - Trajetória</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: transparent; color: white; overflow: hidden; font-family: sans-serif; }
        .arena { padding: 20px; text-align: center; }
        .escudo-img { width: 85px; height: 85px; object-fit: contain; margin: 10px; filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.6)); transition: 0.3s; }
        
        /* Efeito Piscar Ao Vivo */
        .live-badge { animation: pulse 1.5s infinite; background-color: #dc3545; color: white; padding: 3px 10px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; letter-spacing: 1px;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<!-- Letreiro AO VIVO -->
<div class="position-absolute top-0 start-0 m-3 z-3">
    <span class="live-badge"><i class="fa-solid fa-circle"></i> AO VIVO</span>
    <span class="badge bg-dark ms-2 shadow"><i class="fa-solid fa-eye"></i> <span id="espectadores-count">45</span></span>
</div>

<div class="container-fluid arena mt-5">
    <h3 class="text-info fw-bold mb-4 text-uppercase" style="letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
        <i class="fa-solid fa-shoe-prints"></i> Carreira Misteriosa
    </h3>

    <div class="row justify-content-center">
        <div class="col-10">
            <h5 class="text-muted text-uppercase fw-bold mb-3">Escudos Revelados</h5>
            <div id="area-escudos" class="d-flex flex-wrap justify-content-center bg-dark p-4 rounded-4 border border-info shadow-lg" style="min-height: 180px; background: rgba(33, 37, 41, 0.85) !important;">
                <div class="d-flex flex-column align-items-center justify-content-center w-100 opacity-50">
                    <div class="spinner-grow text-info mb-2" role="status"></div>
                    <span>Aguardando palpites...</span>
                </div>
            </div>
            <div id="msg-vencedor" class="mt-4 fs-3 fw-bold text-success d-none bg-dark py-2 px-4 rounded-pill d-inline-block shadow border border-success"></div>
        </div>
    </div>
</div>

<script>
    // Fake contador de espectadores
    setInterval(() => {
        let count = parseInt(document.getElementById('espectadores-count').innerText);
        let variacao = Math.floor(Math.random() * 5) - 2;
        document.getElementById('espectadores-count').innerText = Math.max(12, count + variacao);
    }, 5000);

    function atualizarTransmissao() {
        fetch("{% url 'duelos:status_duelo_api' partida.id %}")
        .then(res => res.json())
        .then(data => {
            let escudosHtml = '';
            if (data.itens_revelados && data.itens_revelados.length > 0) {
                data.itens_revelados.forEach(item => {
                    escudosHtml += `<img src="${item.imagem_url}" class="escudo-img" alt="Escudo">`;
                });
                document.getElementById('area-escudos').innerHTML = escudosHtml;
            }

            if (data.status === 'finalizado') {
                let msgDiv = document.getElementById('msg-vencedor');
                msgDiv.classList.remove('d-none');
                msgDiv.innerHTML = `<i class="fa-solid fa-trophy"></i> Vencedor do Round: ${data.vencedor_nome}`;
            }
        });
    }
    setInterval(atualizarTransmissao, 2000);
</script>
</body>
</html>
