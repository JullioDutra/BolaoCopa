{% extends 'base.html' %}

{% block title %}Jogando - Mini Fanáticos{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        
        <div class="d-flex justify-content-between align-items-center mb-4 bg-dark text-white p-3 rounded-pill shadow-sm" id="header-jogo">
            <div class="fw-bold fs-5 ms-3">
                <i class="fa-solid fa-list-ol text-warning"></i> <span id="contador-pergunta">1</span>/10
            </div>
            <div class="fw-bold fs-4 me-3 text-danger" style="font-family: monospace;">
                <i class="fa-solid fa-stopwatch"></i> <span id="cronometro">00.00</span>s
            </div>
        </div>

        <div id="tela-splash" class="card card-clean shadow-lg border-0 rounded-4 p-5 text-center d-none" style="min-height: 400px; display: flex; align-items: center; justify-content: center; flex-direction: column;">
            <img id="splash-escudo" src="" alt="Escudo" style="max-height: 150px; object-fit: contain;" class="mb-4 d-none">
            <h1 class="fw-bold display-4 mb-2" id="splash-time-nome">Nome do Time</h1>
            <p class="fs-4 text-muted fst-italic">Prepare-se...</p>
        </div>

        <div id="tela-pergunta" class="card card-clean shadow-lg border-0 rounded-4 p-4 p-md-5 text-center" style="border-top: 8px solid var(--bs-primary) !important;">
            
            <span class="badge mb-3 mx-auto fs-6 text-white" id="badge-clube" style="background-color: #333;">
                <i class="fa-solid fa-shield-halved"></i> <span id="clube-alvo">Clube</span>
            </span>
            
            <h3 class="fw-bold mb-5" id="texto-pergunta">Carregando pergunta...</h3>

            <div id="area-resposta" class="mb-5">
                </div>

            <hr class="text-muted opacity-25">

            <div class="text-end">
                <button class="btn btn-outline-danger fw-bold rounded-pill px-4 shadow-sm" onclick="responder('PULAR')">
                    Não sei (Pular) <i class="fa-solid fa-forward-step"></i>
                </button>
            </div>
        </div>

        <div id="tela-loading" class="card card-clean shadow-lg border-0 rounded-4 p-5 text-center d-none">
            <h3 class="fw-bold text-success"><i class="fa-solid fa-check-double"></i> Prova Entregue!</h3>
            <p class="text-muted fs-5 mt-3">O VAR está processando as respostas da sala...</p>
            <div class="spinner-border text-success mt-4" style="width: 3rem; height: 3rem;" role="status"></div>
        </div>

    </div>
</div>

<script>
    const perguntas = JSON.parse('{{ perguntas_json|escapejs }}');
    let indiceAtual = 0;
    let respostasDadas = [];
    let timeAtualDaRodada = null; 
    
    let tempoInicio = Date.now();
    let timerInterval;

    const coresTimes = {
        "Flamengo": "#c10000",
        "Vasco da Gama": "#000000",
        "Fluminense": "#8a0c25",
        "Botafogo": "#000000",
        "Corinthians": "#000000",
        "Palmeiras": "#006437",
        "São Paulo": "#dc3545",
        "Santos": "#000000",
        "Grêmio": "#0d6efd",
        "Internacional": "#dc3545",
        "Cruzeiro": "#0d6efd",
        "Atlético Mineiro": "#000000",
        "Goiás": "#198754"
    };

    function iniciarCronometro() {
        tempoInicio = Date.now();
        timerInterval = setInterval(() => {
            let tempoAtual = (Date.now() - tempoInicio) / 1000;
            document.getElementById('cronometro').innerText = tempoAtual.toFixed(2);
        }, 50);
    }

    function aplicarTemaTime(clubeNome) {
        let cor = coresTimes[clubeNome] || "#333333";
        document.getElementById('tela-pergunta').style.borderTopColor = cor;
        document.getElementById('badge-clube').style.backgroundColor = cor;
    }

    function mostrarSplashETimer(p) {
        document.getElementById('tela-pergunta').classList.add('d-none');
        document.getElementById('tela-splash').classList.remove('d-none');
        
        let splashNome = document.getElementById('splash-time-nome');
        splashNome.innerText = p.clube;
        splashNome.style.color = coresTimes[p.clube] || "#333333";

        let splashImg = document.getElementById('splash-escudo');
        if (p.escudo_url) {
            splashImg.src = p.escudo_url;
            splashImg.classList.remove('d-none');
        } else {
            splashImg.classList.add('d-none');
        }

        setTimeout(() => {
            document.getElementById('tela-splash').classList.add('d-none');
            document.getElementById('tela-pergunta').classList.remove('d-none');
            montarPerguntaInterface(p);
        }, 2500);
    }

    function carregarPergunta() {
        if (indiceAtual >= perguntas.length) {
            finalizarProva();
            return;
        }

        const p = perguntas[indiceAtual];

        if (p.clube !== timeAtualDaRodada) {
            timeAtualDaRodada = p.clube;
            aplicarTemaTime(p.clube);
            mostrarSplashETimer(p);
        } else {
            montarPerguntaInterface(p);
        }
    }

    function montarPerguntaInterface(p) {
        document.getElementById('contador-pergunta').innerText = indiceAtual + 1;
        document.getElementById('clube-alvo').innerText = p.clube;
        document.getElementById('texto-pergunta').innerText = p.texto;

        const area = document.getElementById('area-resposta');
        area.innerHTML = '';

        if (p.tipo === 'multipla') {
            const alternativas = [
                { id: 'a', texto: p.opcao_a },
                { id: 'b', texto: p.opcao_b },
                { id: 'c', texto: p.opcao_c },
                { id: 'd', texto: p.opcao_d }
            ];

            let htmlBotoes = '<div class="row g-3">';
            alternativas.forEach(alt => {
                if (alt.texto) {
                    htmlBotoes += `
                        <div class="col-md-6">
                            <button class="btn btn-outline-dark w-100 py-3 fw-bold fs-5 rounded-4 shadow-sm" onclick="responder('${alt.id}')">
                                ${alt.texto}
                            </button>
                        </div>
                    `;
                }
            });
            htmlBotoes += '</div>';
            area.innerHTML = htmlBotoes;

        } else if (p.tipo === 'aberta') {
            
            // FILTRO ANTI-NÚMERO E TAMANHO MINIMO
            let gabaritoOrig = p.resposta_correta.trim();
            let respostaLimpa = gabaritoOrig.replace(/[\s\-]+/g, '').toUpperCase();
            let contemNumero = /\d/.test(gabaritoOrig); // Procura se tem número (ex: 6x2)
            
            // Só vira anagrama se não tiver números E a resposta tiver mais que 2 caracteres E cair nos 50% de chance
            let ehAnagrama = (!contemNumero && respostaLimpa.length > 2) ? (Math.random() > 0.5) : false;

            if (ehAnagrama) {
                let letrasMisturadas = respostaLimpa.split('').sort(() => Math.random() - 0.5);
                
                // Interface com Botão Limpar
                area.innerHTML = `
                    <p class="text-primary fw-bold mb-2"><i class="fa-solid fa-shuffle"></i> MODO ANAGRAMA! Monte a palavra:</p>
                    <div class="d-flex justify-content-center align-items-center gap-3 mb-3" style="min-height: 50px;">
                        <div id="anagrama-resposta" class="fw-bold fs-2 text-success" style="letter-spacing: 5px;"></div>
                        <button id="btn-limpar-anagrama" class="btn btn-outline-danger d-none"><i class="fa-solid fa-eraser"></i> Limpar</button>
                    </div>
                    <div id="anagrama-letras" class="d-flex flex-wrap justify-content-center gap-2"></div>
                `;

                const boxLetras = document.getElementById('anagrama-letras');
                const boxResposta = document.getElementById('anagrama-resposta');
                const btnLimpar = document.getElementById('btn-limpar-anagrama');
                let palavraMontada = "";

                // Função de Limpar as letras
                btnLimpar.onclick = function() {
                    palavraMontada = "";
                    boxResposta.innerText = "";
                    boxResposta.classList.replace('text-danger', 'text-success');
                    Array.from(boxLetras.children).forEach(b => {
                        b.disabled = false;
                        b.classList.replace('btn-secondary', 'btn-primary');
                    });
                    btnLimpar.classList.add('d-none');
                };

                letrasMisturadas.forEach((letra) => {
                    let btn = document.createElement('button');
                    btn.className = 'btn btn-primary fw-bold fs-4 shadow-sm';
                    btn.innerText = letra;
                    
                    btn.onclick = function() {
                        this.disabled = true;
                        this.classList.replace('btn-primary', 'btn-secondary');
                        palavraMontada += letra;
                        boxResposta.innerText = palavraMontada;
                        btnLimpar.classList.remove('d-none'); // Mostra o botão limpar

                        if (palavraMontada === respostaLimpa) {
                            boxResposta.classList.add('text-success');
                            btnLimpar.classList.add('d-none');
                            setTimeout(() => responder(p.resposta_correta), 500);
                        } else if (palavraMontada.length === respostaLimpa.length) {
                            // Errou o anagrama: pisca vermelho e depois limpa sozinho
                            boxResposta.classList.replace('text-success', 'text-danger');
                            btnLimpar.classList.add('d-none');
                            setTimeout(() => {
                                btnLimpar.onclick();
                            }, 600);
                        }
                    };
                    boxLetras.appendChild(btn);
                });

            } else {
                // JOGO: INPUT COM TRAVA DE RESPOSTA CERTA
                area.innerHTML = `
                    <p class="text-primary fw-bold mb-2"><i class="fa-solid fa-lock"></i> TRAVA ATIVADA! Só avança se digitar certo.</p>
                    <div class="input-group input-group-lg mx-auto" style="max-width: 500px;">
                        <input type="text" id="input-aberta" class="form-control border-dark border-2 shadow-sm text-center fw-bold text-uppercase" placeholder="Digite a resposta exata...">
                    </div>
                `;
                
                let inputEl = document.getElementById('input-aberta');
                inputEl.addEventListener('input', function(e) {
                    // Limpa acentos e espaços de quem digitou e do gabarito para não ser chato na validação
                    let valorDigitado = this.value.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "");
                    let gabarito = p.resposta_correta.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "");
                    
                    if (valorDigitado === gabarito) {
                        this.classList.replace('border-dark', 'border-success');
                        this.classList.add('bg-success', 'text-white');
                        this.disabled = true;
                        setTimeout(() => responder(p.resposta_correta), 600);
                    }
                });
                setTimeout(() => inputEl.focus(), 100);
            }
        }
    }

    function responder(valorDigitadoClicado) {
        respostasDadas.push({
            id: perguntas[indiceAtual].id,
            resposta: valorDigitadoClicado === 'PULAR' ? '' : valorDigitadoClicado
        });
        
        indiceAtual++;
        carregarPergunta();
    }

    function finalizarProva() {
        clearInterval(timerInterval);
        let tempoFinal = (Date.now() - tempoInicio) / 1000;

        document.getElementById('tela-pergunta').classList.add('d-none');
        document.getElementById('header-jogo').classList.add('d-none');
        document.getElementById('tela-loading').classList.remove('d-none');

        fetch("{% url 'duelos:submeter_respostas_mini' partida.id %}", {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ respostas: respostasDadas, tempo_total: tempoFinal })
        }).then(res => res.json()).then(data => {
            if(data.sucesso) {
                checarFimDeJogo();
            }
        });
    }

    function checarFimDeJogo() {
        setInterval(() => {
            fetch("{% url 'duelos:status_lobby_mini_api' partida.id %}")
            .then(res => res.json())
            .then(data => {
                if(data.status === 'finalizado') {
                    window.location.href = "{% url 'duelos:resultado_mini' partida.id %}";
                }
            });
        }, 2000);
    }

    window.onload = () => {
        iniciarCronometro();
        carregarPergunta(); 
    };
</script>
{% endblock %}
