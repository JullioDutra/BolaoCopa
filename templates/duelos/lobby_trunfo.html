{% extends 'base.html' %}

{% block title %}Vestiário - Super Trunfo{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card p-5 shadow border-0 border-top border-5 border-warning rounded-4 bg-dark text-white">
            <i class="fa-solid fa-bolt text-warning mb-3" style="font-size: 4rem;"></i>
            <h2 class="fw-bold text-warning">Mesa Aberta!</h2>
            <p class="fs-5 text-light">Aguardando seu adversário puxar a cadeira...</p>

            <div class="bg-secondary p-3 rounded-3 mb-4 mt-3">
                <p class="small mb-2 text-uppercase fw-bold text-warning">Envie este link para o desafiante:</p>
                <div class="input-group">
                    <input type="text" class="form-control form-control-lg text-center fw-bold bg-light" id="link-convite" value="{{ link_convite }}" readonly>
                    <button class="btn btn-warning fw-bold px-4" onclick="copiarLink()">
                        <i class="fa-solid fa-copy"></i> Copiar
                    </button>
                </div>
            </div>

            <div class="mt-2">
                <div class="spinner-border text-warning" role="status" style="width: 3rem; height: 3rem;"></div>
                <h5 class="mt-3 fw-bold">Aquecendo o baralho...</h5>
            </div>
        </div>
    </div>
</div>

<script>
    function copiarLink() {
        var linkInput = document.getElementById("link-convite");
        navigator.clipboard.writeText(linkInput.value).then(function() {
            alert("Link copiado! Cole no WhatsApp do seu rival.");
        }, function() {
            // Fallback caso o navegador bloqueie
            linkInput.select();
            document.execCommand("copy");
            alert("Link copiado! Cole no WhatsApp do seu rival.");
        });
    }

    // O "Olheiro" que fica checando se o rival entrou no link
    setInterval(() => {
        fetch("{% url 'duelos:status_trunfo_api' partida.id %}")
        .then(res => res.json())
        .then(data => {
            // Se o status mudou de 'aguardando' para 'andamento', o jogo começa!
            if(data.status !== 'aguardando') {
                window.location.href = "{% url 'duelos:tela_jogo_trunfo' partida.id %}";
            }
        });
    }, 2000);
</script>
{% endblock %}
