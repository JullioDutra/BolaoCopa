{% extends 'base.html' %}

{% block title %}Vestiário - Super Trunfo{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <!-- Usando o padrão 'card-clean' com borda superior da cor do jogo -->
        <div class="card card-clean p-5 shadow border-0 border-top border-5 border-warning rounded-4">
            
            <div class="mb-4">
                <div class="spinner-border text-warning" role="status" style="width: 4rem; height: 4rem;"></div>
            </div>
            
            <h2 class="fw-bold text-dark mb-3">Mesa Aberta!</h2>
            <p class="text-muted fs-5 mb-4">Aguardando seu adversário puxar a cadeira...</p>

            <div class="bg-light p-4 rounded-4 mb-4 border border-secondary" style="border-style: dashed !important;">
                <p class="small mb-2 text-uppercase fw-bold text-muted">Envie este link para o desafiante:</p>
                <div class="input-group input-group-lg shadow-sm">
                    <input type="text" class="form-control text-center fw-bold bg-white" id="link-convite" value="{{ link_convite }}" readonly>
                    <button class="btn btn-warning fw-bold px-4 shadow-sm text-dark" onclick="copiarLink()">
                        <i class="fa-solid fa-copy"></i> Copiar
                    </button>
                </div>
            </div>

            <p class="small text-muted fst-italic mb-0">
                <i class="fa-solid fa-circle-info"></i> O embate começará automaticamente assim que ele acessar o link.
            </p>
        </div>
    </div>
</div>

<script>
    function copiarLink() {
        var linkInput = document.getElementById("link-convite");
        navigator.clipboard.writeText(linkInput.value).then(function() {
            alert("Link copiado! Mande pro seu rival e prepare as cartas.");
        }, function() {
            linkInput.select();
            document.execCommand("copy");
            alert("Link copiado! Mande pro seu rival e prepare as cartas.");
        });
    }

    // O "Olheiro" que fica checando se o rival entrou no link
    setInterval(() => {
        fetch("{% url 'duelos:status_trunfo_api' partida.id %}")
        .then(res => res.json())
        .then(data => {
            // Se o status mudou de 'aguardando' para 'andamento', o jogo começa!
            if(data.status !== 'aguardando') {
                window.location.href = "{% url 'duelos:tela_jogo_trunfo' partida.id %}";
            }
        });
    }, 2000);
</script>
{% endblock %}
